name: CI — API

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/ci-api.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/ci-api.yml'

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: api

jobs:
  scan_ruby:
    name: Security scan (Brakeman)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: api

      - name: Scan for Rails security vulnerabilities
        run: bin/brakeman --no-pager

  lint:
    name: Lint (RuboCop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: api

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    name: Tests (RSpec)
    runs-on: ubuntu-latest
    needs: [scan_ruby, lint]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: two_brothers_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/two_brothers_test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      STORE_ADDRESS: "Washington 133, Dolores, Buenos Aires, Argentina"
      STORE_LATITUDE: "-36.3133"
      STORE_LONGITUDE: "-57.6837"

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: api

      - name: Setup database
        run: bin/rails db:schema:load

      - name: Run tests
        run: bundle exec rspec
