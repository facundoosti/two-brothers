version: 2
updates:
  # Rails gems
  - package-ecosystem: bundler
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # React/Node packages
  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
